<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apply Bus Pass</title>
    <link rel="stylesheet" href="applycss.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="container">
    <a href="index.html" class="home"><i class="fas fa-house"></i></a>
    <h2>Bus Pass Application</h2>

    <form id="passForm">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="text" id="roll" placeholder="Roll Number" required>
        <input type="text" id="course" placeholder="Course (e.g. B.Tech, BCA)" required>
        <input type="text" id="route" placeholder="Bus Route" required>
        <button type="submit">Submit Application</button>
    </form>
</div>

<div class="modal-overlay" id="successModal">
    <div class="modal-content">
        <i class="fas fa-check-circle" style="font-size: 50px; color: #10b981; margin-bottom: 15px;"></i>
        <h3>Application Received</h3>
        <p>Your details have been saved. Please contact the administrator to download your QR Pass.</p>
        <button class="close-btn" onclick="window.location.href='index.html'" style="background:#3a7bd5; color:white; padding:10px 20px; border:none; border-radius:8px; margin-top:15px; cursor:pointer;">Back to Home</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
