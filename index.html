<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Pass Portal</title>
    <link rel="stylesheet" href="indexcss.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="glass-container">
    <div class="logo-area">
        <i class="fas fa-bus-alt icon-main"></i>
    </div>
    <h1>Travel <span>Smart</span></h1>
    <p>Efficient Digital Bus Pass Management</p>

    <div class="btn-group">
        <a href="apply.html" class="btn apply"><i class="fas fa-id-card"></i> Apply for Pass</a>
        <button class="btn admin" onclick="openAdminModal()"><i class="fas fa-user-shield"></i> Admin Login</button>
    </div>
</div>

<div class="modal-overlay" id="adminModal">
    <div class="modal-content">
        <h3><i class="fas fa-lock"></i> Admin Access</h3>
        <div class="password-wrapper">
            <input type="password" id="adminPassword" placeholder="Enter Admin Password">
            <i class="fas fa-eye" id="togglePassword" onclick="togglePassVisibility()"></i>
        </div>
        <div class="modal-btns">
            <button class="login-btn" onclick="verifyAdmin()">Login</button>
            <button class="close-btn" onclick="closeAdminModal()">Cancel</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
